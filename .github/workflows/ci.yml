name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: knpodly_test
          POSTGRES_USER: knpodly
          POSTGRES_PASSWORD: knpodly
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://knpodly:knpodly@localhost:5432/knpodly_test
      JWT_SECRET_KEY: test-secret-key
      LIBVIRT_DRIVER: fake
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install system deps (libvirt headers for libvirt-python)
        run: sudo apt-get update && sudo apt-get install -y libvirt-dev pkg-config
      - name: Install Python deps
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (black)
        run: black --check .
      - name: Type check (mypy)
        run: mypy app || true   # non-blocking initially; tighten once fully typed
      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t knpodly-backend:ci ./backend --target prod
      - name: Build frontend image
        run: docker build -t knpodly-frontend:ci ./frontend --target prod
