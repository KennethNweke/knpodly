# Copy to secret.yaml, fill in real values, and NEVER commit the filled-in
# version. Consider a secrets manager (Sealed Secrets, External Secrets,
# Vault) instead of raw Secret manifests for anything beyond a quick start.
apiVersion: v1
kind: Secret
metadata:
  name: knpodly-secrets
  namespace: knpodly
type: Opaque
stringData:
  JWT_SECRET_KEY: "change-me"
  DATABASE_URL: "postgresql+asyncpg://knpodly:change-me@postgres:5432/knpodly"
  REDIS_URL: "redis://redis:6379/0"
  POSTGRES_PASSWORD: "change-me"
