apiVersion: apps/v1
kind: Deployment
metadata:
  name: knpodly-vm-worker
  namespace: knpodly
spec:
  replicas: 2
  selector:
    matchLabels: { app: knpodly-vm-worker }
  template:
    metadata:
      labels: { app: knpodly-vm-worker }
    spec:
      containers:
        - name: vm-worker
          image: your-registry/knpodly-backend:v0.1.0
          command: ["arq", "app.workers.vm_worker.WorkerSettings"]
          envFrom:
            - configMapRef: { name: knpodly-config }
            - secretRef: { name: knpodly-secrets }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
