apiVersion: apps/v1
kind: Deployment
metadata:
  name: knpodly-backend
  namespace: knpodly
spec:
  replicas: 2
  selector:
    matchLabels: { app: knpodly-backend }
  template:
    metadata:
      labels: { app: knpodly-backend }
    spec:
      containers:
        - name: backend
          image: your-registry/knpodly-backend:v0.1.0
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: knpodly-config }
            - secretRef: { name: knpodly-secrets }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
