# HTTP -> HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name labs.example.edu;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name labs.example.edu;

    ssl_certificate     /etc/letsencrypt/live/labs.example.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/labs.example.edu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Frontend (React SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Image uploads (large files): disable request buffering so nginx streams
    # straight through to the backend instead of buffering the whole file in
    # memory/disk first, and allow a long timeout for slow campus uplinks.
    location ~ ^/api/v1/operating-systems/[^/]+/upload-image$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        client_max_body_size 50g;
    }

    # REST API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (dashboard live stats, session state)
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # noVNC console websocket proxy (per-VM path carries session token)
    location /console/ {
        proxy_pass http://backend:8000/console/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
